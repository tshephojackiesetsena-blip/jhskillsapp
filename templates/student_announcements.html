<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Notices</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="student-portal-body">
    <div class="student-shell">
        {% include 'student_sidebar.html' %}
        <main class="student-main">
            <div class="student-page-header">
                <div>
                    <p class="student-eyebrow">Announcements / Notices</p>
                    <h1>Campus and academic notices</h1>
                    <p class="student-subtext">Important alerts for registration, finance, assessments, and university support.</p>
                </div>
            </div>

            <section class="student-panel">
                <div class="student-notice-list">
                    {% for item in announcements %}
                    <div class="student-notice-item">
                        <small>{{ item.category }} | {{ item.date }}</small>
                        <strong>{{ item.title }}</strong>
                        <p>{{ item.summary }}</p>
                    </div>
                    {% endfor %}
                </div>
            </section>
        </main>
    </div>
</body>
</html>
